<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel-A-Factory Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #e94560;
        }
        .round-info {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 1.5rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
            max-width: 1100px;
            width: 100%;
            margin-bottom: 2rem;
        }
        .card {
            background: #16213e;
            border: 3px solid transparent;
            border-radius: 12px;
            padding: 0.75rem;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.15s;
            text-align: center;
        }
        .card:hover { border-color: #e94560; transform: scale(1.02); }
        .card.selected { border-color: #0f3460; box-shadow: 0 0 20px rgba(15,52,96,0.6); }
        .card img {
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            border-radius: 8px;
            background: #0a0a1a;
        }
        .card .label {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #aaa;
        }
        .controls {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #16213e;
            border-radius: 8px;
            background: #0f3460;
            color: #eee;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 80px;
        }
        textarea::placeholder { color: #666; }
        textarea:focus { outline: none; border-color: #e94560; }
        .buttons {
            display: flex;
            gap: 1rem;
        }
        button {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-refine { background: #e94560; color: #fff; }
        .btn-approve { background: #0cca4a; color: #fff; }
        .status {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
            min-height: 1.5rem;
        }
        .waiting {
            text-align: center;
            font-size: 1.1rem;
            color: #888;
            margin-top: 4rem;
        }
        .waiting .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #333;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>🎮 Pixel-A-Factory</h1>
    <div class="round-info">라운드 #<span id="round">{{ round_number }}</span></div>

    <div id="content">
        {% if count > 0 %}
        <div class="grid" id="grid">
            {% for i in range(count) %}
            <div class="card" data-index="{{ i }}" onclick="selectCard({{ i }})">
                <img src="/image/{{ i }}?r={{ round_number }}" alt="후보 {{ i + 1 }}">
                <div class="label">후보 {{ i + 1 }}</div>
            </div>
            {% endfor %}
        </div>

        <div class="controls">
            <textarea id="feedback" placeholder="수정 요청 사항을 입력하세요 (예: 머리색을 파란색으로 바꿔줘)"></textarea>
            <div class="buttons">
                <button class="btn-refine" id="btnRefine" onclick="submit(false)" disabled>
                    🔄 수정 요청
                </button>
                <button class="btn-approve" id="btnApprove" onclick="submit(true)" disabled>
                    ✅ 이걸로 진행
                </button>
            </div>
        </div>
        <div class="status" id="status"></div>
        {% else %}
        <div class="waiting">
            <span class="spinner"></span> 이미지 생성 대기 중...
        </div>
        {% endif %}
    </div>

    <script>
        let selectedIndex = null;
        let currentRound = {{ round_number }};

        function selectCard(idx) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            document.querySelector(`[data-index="${idx}"]`).classList.add('selected');
            selectedIndex = idx;
            document.getElementById('btnRefine').disabled = false;
            document.getElementById('btnApprove').disabled = false;
        }

        async function submit(approve) {
            if (selectedIndex === null) return;

            const feedback = document.getElementById('feedback').value.trim();
            const statusEl = document.getElementById('status');

            try {
                const resp = await fetch('/select', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        index: selectedIndex,
                        feedback: feedback,
                        approve: approve,
                    }),
                });
                const data = await resp.json();
                if (data.ok) {
                    statusEl.textContent = approve
                        ? '✅ 확정! 애니메이션 생성을 시작합니다...'
                        : '🔄 수정 요청 전송 완료! 새 이미지 생성 중...';
                    document.getElementById('btnRefine').disabled = true;
                    document.getElementById('btnApprove').disabled = true;
                    if (!approve) pollForNewRound();
                } else {
                    statusEl.textContent = '❌ 오류: ' + (data.error || '알 수 없는 오류');
                }
            } catch (e) {
                statusEl.textContent = '❌ 서버 연결 실패';
            }
        }

        async function pollForNewRound() {
            while (true) {
                await new Promise(r => setTimeout(r, 2000));
                try {
                    const resp = await fetch('/status');
                    const data = await resp.json();
                    if (data.round > currentRound) {
                        location.reload();
                        return;
                    }
                } catch (e) { /* 서버 재시작 중일 수 있음 */ }
            }
        }

        // 이미지 없으면 자동 폴링
        {% if count == 0 %}
        (async function waitForImages() {
            while (true) {
                await new Promise(r => setTimeout(r, 2000));
                try {
                    const resp = await fetch('/status');
                    const data = await resp.json();
                    if (data.count > 0) {
                        location.reload();
                        return;
                    }
                } catch (e) {}
            }
        })();
        {% endif %}
    </script>
</body>
</html>
